services:
  redis:
    image: redis/redis-stack:latest
    container_name: arcane-redis
    ports:
      - "6379:6379"     # Redis server
      - "8001:8001"     # RedisInsight (web UI for Redis)
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
